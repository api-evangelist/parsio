meters:
- name: credits_consumed
  description: Credits consumed when a document or email is parsed for the first time.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - mailbox
  - parser_engine
- name: documents_parsed
  description: Count of documents and emails parsed, each consuming 1+ credits by engine.
  unit: documents
  aggregation: sum
  dimensions:
  - account
  - mailbox
- name: pdf_pages_parsed
  description: PDF pages parsed, billed per page at the engine's credit multiplier.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - mailbox
  - parser_engine
- name: plan_subscription
  description: Recurring monthly or annual subscription charge granting the credit allotment.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: credits_expired
  description: Unused credits that expired at the end of the billing period (waste signal).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track credits consumed per mailbox and parser engine; monitor credits expired as a waste signal.
- name: Allocation
  description: Use one mailbox per workload/team to attribute credit consumption to cost centers.
- name: Optimization
  description: Right-size the plan to actual document volume, choose the lowest-cost engine that meets accuracy needs (template before AI/GPT/OCR), and consume the full monthly allotment before it expires.
- name: Accountability
  description: Assign owners per mailbox; review monthly credit burn and plan fit against budget.
