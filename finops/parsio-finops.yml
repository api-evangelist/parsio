description: >-
  FinOps view of Parsio spend. Parsio bills on a credit-based subscription: each
  plan grants a fixed monthly credit allotment, and a credit is consumed the first
  time a document or email is parsed. One parsed document or PDF page costs 1, 2,
  or more credits depending on the parser engine (template, AI, GPT, or AI OCR).
  Unused credits expire at the end of each billing period, so cost optimization
  centers on right-sizing the plan, choosing the cheapest sufficient engine, and
  fully consuming the monthly allotment.
notes: >-
  Plan prices and credit allotments are subject to change; verify against the
  Parsio pricing page during reconciliation. Per-engine credit multipliers
  determine effective cost per document.
